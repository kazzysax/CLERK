<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>How did we do?</title>
<style>
  :root {
    --void:#05060E; --paper:#E8ECFF; --muted:#8B94BC;
    --cyan:#22F3EE; --magenta:#FF3DA6; --line:rgba(124,134,173,.2);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { -webkit-text-size-adjust:100%; }
  body {
    background:var(--void); color:var(--paper);
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    min-height:100vh; min-height:100dvh; display:grid; place-items:center; padding:24px;
    overflow-x:hidden;
  }

  /* ambient aurora */
  .aurora { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .aurora i {
    position:absolute; border-radius:50%; filter:blur(90px); opacity:.16;
    animation:drift 24s ease-in-out infinite alternate;
  }
  .aurora i:nth-child(1) { width:520px; height:520px; background:var(--cyan); top:-180px; left:-140px; }
  .aurora i:nth-child(2) { width:460px; height:460px; background:var(--magenta); bottom:-200px; right:-120px; opacity:.10; animation-delay:-12s; }
  @keyframes drift {
    from { transform:translate3d(0,0,0) scale(1); }
    to   { transform:translate3d(60px,40px,0) scale(1.15); }
  }

  /* glass card with gradient hairline */
  .card {
    position:relative; z-index:1; width:100%; max-width:400px; text-align:center; padding:44px 28px 40px;
    background:rgba(15,19,36,.55); border-radius:24px;
    -webkit-backdrop-filter:blur(20px) saturate(1.3); backdrop-filter:blur(20px) saturate(1.3);
    box-shadow:0 24px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(232,236,255,.06);
    animation:rise .5s cubic-bezier(.22,1,.36,1) both;
  }
  .card::before {
    content:""; position:absolute; inset:0; border-radius:inherit; padding:1px; pointer-events:none;
    background:linear-gradient(160deg, rgba(34,243,238,.45), rgba(124,134,173,.12) 35%, rgba(124,134,173,.12) 65%, rgba(255,61,166,.30));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
  }
  @keyframes rise { from { opacity:0; transform:translateY(14px) scale(.985); } }

  h1 {
    font-size:21px; font-weight:650; letter-spacing:-.02em; margin-bottom:8px;
    background:linear-gradient(180deg, var(--paper), rgba(232,236,255,.72));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  p { color:var(--muted); font-size:13.5px; line-height:1.6; }

  /* stars */
  .stars { display:flex; justify-content:center; gap:6px; margin:30px 0 10px; }
  .stars button {
    appearance:none; background:none; border:none; cursor:pointer; padding:6px; line-height:0;
    border-radius:12px; color:rgba(124,134,173,.35);
    transition:color .15s, transform .18s cubic-bezier(.34,1.56,.64,1), filter .15s;
    animation:rise .5s cubic-bezier(.22,1,.36,1) both;
  }
  .stars button:nth-child(1) { animation-delay:.05s; }
  .stars button:nth-child(2) { animation-delay:.09s; }
  .stars button:nth-child(3) { animation-delay:.13s; }
  .stars button:nth-child(4) { animation-delay:.17s; }
  .stars button:nth-child(5) { animation-delay:.21s; }
  .stars svg { width:36px; height:36px; display:block; }
  .stars svg path { fill:currentColor; stroke:currentColor; stroke-width:1.4; stroke-linejoin:round; transition:fill .15s, stroke .15s; }
  .stars button:hover, .stars button.on {
    color:var(--cyan);
    filter:drop-shadow(0 0 10px rgba(34,243,238,.55));
  }
  .stars button:hover { transform:scale(1.18) rotate(-4deg); }
  .stars button:active { transform:scale(.94); }
  .stars button:focus-visible { outline:2px solid var(--cyan); outline-offset:2px; }
  .stars button.picked { animation:pop .35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { 40% { transform:scale(1.35); } }

  .hint { font-size:11px; letter-spacing:.02em; color:var(--muted); min-height:16px; transition:color .15s; }
  .hint.live { color:var(--cyan); }
  .err { color:var(--magenta); font-size:12.5px; margin-top:14px; min-height:16px; }

  /* success state */
  .done { display:none; }
  .done.show { display:block; animation:rise .45s cubic-bezier(.22,1,.36,1) both; }
  .ring { width:76px; height:76px; margin:0 auto 18px; display:block; }
  .ring circle {
    fill:none; stroke:rgba(34,243,238,.25); stroke-width:2;
    stroke-dasharray:214; stroke-dashoffset:214; animation:draw .7s .1s ease-out forwards;
  }
  .ring path {
    fill:none; stroke:var(--cyan); stroke-width:3.4; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:40; stroke-dashoffset:40; animation:draw .45s .55s cubic-bezier(.22,1,.36,1) forwards;
    filter:drop-shadow(0 0 12px rgba(34,243,238,.6));
  }
  @keyframes draw { to { stroke-dashoffset:0; } }

  @media (prefers-reduced-motion: reduce) {
    * { transition:none !important; animation-duration:.001s !important; animation-delay:0s !important; }
  }
</style>
<div class="aurora" aria-hidden="true"><i></i><i></i></div>
<div class="card">
  <div id="ask">
    <h1>How did we do?</h1>
    <p>You recently contacted support. One tap tells us whether your issue was truly resolved.</p>
    <div class="stars" id="stars"></div>
    <div class="hint" id="hint">Tap a star — that's it.</div>
    <div class="err" id="err" role="alert"></div>
  </div>
  <div class="done" id="done">
    <svg class="ring" viewBox="0 0 76 76" aria-hidden="true">
      <circle cx="38" cy="38" r="34"></circle>
      <path d="M25 39.5 L34 48.5 L52 29"></path>
    </svg>
    <h1>Thank you</h1>
    <p id="doneMsg">Your rating is recorded. It directly shapes the quality of the support you get next time.</p>
  </div>
</div>
<script>
  var token = location.pathname.split('/').pop();
  var labels = { 1:'Not resolved at all', 2:'Poorly handled', 3:'Okay', 4:'Good', 5:'Perfectly resolved' };
  var STAR = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.6l2.9 5.9 6.5.95-4.7 4.6 1.1 6.5L12 17.5l-5.8 3.05 1.1-6.5-4.7-4.6 6.5-.95z"/></svg>';
  var wrap = document.getElementById('stars');
  var hint = document.getElementById('hint');
  for (var i = 1; i <= 5; i++) {
    var b = document.createElement('button');
    b.dataset.v = i;
    b.setAttribute('aria-label', i + ' star' + (i > 1 ? 's' : ''));
    b.innerHTML = STAR;
    wrap.appendChild(b);
  }
  var stars = document.querySelectorAll('#stars button');
  var sending = false;
  stars.forEach(function (b) {
    b.addEventListener('mouseenter', function () { paint(+b.dataset.v); hint.textContent = labels[+b.dataset.v]; hint.classList.add('live'); });
    b.addEventListener('mouseleave', function () { if (!sending) { paint(0); hint.textContent = "Tap a star — that's it."; hint.classList.remove('live'); } });
    b.addEventListener('focus', function () { paint(+b.dataset.v); hint.textContent = labels[+b.dataset.v]; hint.classList.add('live'); });
    b.addEventListener('click', function () { submit(+b.dataset.v, b); });
  });
  function paint(n) { stars.forEach(function (s) { s.classList.toggle('on', +s.dataset.v <= n); }); }
  function submit(v, btn) {
    if (sending) return; sending = true; paint(v);
    btn.classList.add('picked');
    hint.textContent = labels[v]; hint.classList.add('live');
    fetch('/api/rate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, rating: v })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (res.ok) { document.getElementById('ask').style.display = 'none'; document.getElementById('done').classList.add('show'); }
        else { sending = false; document.getElementById('err').textContent = res.j.error || 'Something went wrong — try the link again.'; }
      })
      .catch(function () { sending = false; document.getElementById('err').textContent = 'Network error — check your connection and tap again.'; });
  }
</script>
